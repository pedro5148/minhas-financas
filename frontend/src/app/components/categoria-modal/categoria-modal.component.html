<h2 mat-dialog-title>Nova Categoria</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="b2b-form">

    <div class="form-group">
        <label for="nome">Nome da Categoria <span class="required">*</span></label>
        <input
          id="nome"
          type="text"
          formControlName="nome"
          placeholder="Ex: Alimentação"
          [class.is-invalid]="form.get('nome')?.invalid && form.get('nome')?.touched"
          class="input-lg"
        />
        <div class="error-text" *ngIf="form.get('nome')?.invalid && form.get('nome')?.touched">
          O nome da categoria é obrigatório.
        </div>
      </div>


    <div class="form-group">
      <label for="subcategoriaNome">Nome da Subcategoria <span class="optional">(Opcional)</span></label>
      <input
        id="subcategoriaNome"
        type="text"
        formControlName="subcategoriaNome"
        placeholder="Ex: Mercado"
      />
      <p class="field-hint">Se não informado, será criada uma subcategoria 'Outros'.</p>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancelar()" [disabled]="salvando" class="btn-cancelar">Cancelar</button>
  <button mat-raised-button color="primary" (click)="salvar()" [disabled]="form.invalid || salvando" class="btn-salvar">
    <div class="button-content">
      <mat-spinner *ngIf="salvando" diameter="18" class="spinner-button"></mat-spinner>
      <span *ngIf="!salvando">Adicionar</span>
      <span *ngIf="salvando">Adicionando...</span>
    </div>
  </button>
</mat-dialog-actions>
