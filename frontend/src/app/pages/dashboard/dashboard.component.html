<div class="dashboard-container">
  
  <header class="dashboard-header card-panel">
    <button mat-icon-button (click)="mudarMes(-1)" class="month-nav-btn">
      <mat-icon>chevron_left</mat-icon>
    </button>
    <h2 class="month-title">{{ getNomeMesAno() }}</h2>
    <button mat-icon-button (click)="mudarMes(1)" class="month-nav-btn">
      <mat-icon>chevron_right</mat-icon>
    </button>
  </header>

  <app-dashboard-resumo-saldos
    [saldoInicial]="saldoInicial"
    [saldoAtual]="saldoAtual"
    [saldoPrevisto]="saldoPrevisto">
  </app-dashboard-resumo-saldos>

  <app-dashboard-detalhes-pendencias
    [totalDespesasPendentes]="totalDespesasPendentes"
    [totalReceitasPendentes]="totalReceitasPendentes"
    [totalTransferencias]="totalTransferencias">
  </app-dashboard-detalhes-pendencias>

  <div class="lists-grid">
    <app-dashboard-ultimos-lancamentos
      titulo="Últimas Despesas"
      tipoBadge="despesa"
      [lancamentos]="ultimasDespesas"
      (editar)="abrirModalEdicaoLancamento($event)"
      (excluir)="excluirLancamento($event)">
    </app-dashboard-ultimos-lancamentos>

    <app-dashboard-ultimos-lancamentos
      titulo="Últimas Receitas"
      tipoBadge="receita"
      [lancamentos]="ultimasReceitas"
      (editar)="abrirModalEdicaoLancamento($event)"
      (excluir)="excluirLancamento($event)">
    </app-dashboard-ultimos-lancamentos>
  </div>

  <app-dashboard-totalizador
    [totalRecebido]="totalRecebido"
    [totalGasto]="totalGasto">
  </app-dashboard-totalizador>

  <div class="fab-container">
    <button mat-fab class="main-fab primary-fab">
      <mat-icon>add</mat-icon>
    </button>
    <div class="fab-menu">
      <button mat-mini-fab color="warn" (click)="abrirModalNovoLancamento('DESPESA')" matTooltip="Nova Despesa" class="menu-fab-btn">
        <mat-icon>remove</mat-icon>
      </button>
      <button mat-mini-fab (click)="abrirModalNovoLancamento('RECEITA')" matTooltip="Nova Receita" class="menu-fab-btn success-fab">
        <mat-icon>add</mat-icon>
      </button>
      <button mat-mini-fab color="accent" (click)="abrirModalNovoLancamento('TRANSFERENCIA')" matTooltip="Nova Transferência" class="menu-fab-btn accent-fab">
        <mat-icon>swap_horiz</mat-icon>
      </button>
    </div>
  </div>
</div>
